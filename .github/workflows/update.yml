name: Daily IPTV Update

on:
  schedule:
    - cron: '17 4 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Generate playlists
        run: python scripts/update_playlist.py

      - name: Health check
        run: python scripts/health_check.py

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add dach-legal.m3u epg-links.md epg-links.en.md de.m3u at.m3u ch.m3u dach.m3u favorites.m3u health-report.md index.html README.md README.en.md agent-flow.md agent-flow.en.md
          git diff --cached --quiet || git commit -m "chore: daily IPTV update"
          git push
